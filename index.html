<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#0f172a',
                        card: '#1e293b',
                        primary: '#ef4444', // اللون الأحمر للبطولة
                        border: '#334155',
                        muted: '#94a3b8'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-[#0f172a] text-white p-6">

    <h2 class="mb-6 text-3xl font-black text-center">ترتيب <span class="text-red-500">المجموعات</span></h2>
    
    <div id="groups-container" class="grid gap-6 md:grid-cols-2 xl:grid-cols-3">
        <!-- سيتم تحميل المجموعات هنا تلقائياً -->
    </div>

    <script>
        fetch('groups.json')
            .then(res => res.json())
            .then(data => {
                const container = document.getElementById('groups-container');
                container.innerHTML = data.map(g => `
                    <article class="overflow-hidden rounded-2xl border border-slate-700 bg-slate-800 shadow-lg transition-transform hover:-translate-y-1">
                        <header class="flex items-center justify-between bg-gradient-to-l from-red-900/20 to-transparent px-5 py-3">
                            <h3 class="text-xl font-black">${g.group}</h3>
                            <span class="text-xs font-semibold text-gray-400">4 منتخبات</span>
                        </header>
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm">
                                <thead class="bg-slate-900/50 text-xs text-gray-400">
                                    <tr>
                                        <th class="px-2 py-2">#</th>
                                        <th class="px-2 py-2 text-right">المنتخب</th>
                                        <th class="px-1 py-2">ل</th>
                                        <th class="px-1 py-2">ف</th>
                                        <th class="px-1 py-2">ت</th>
                                        <th class="px-1 py-2">خ</th>
                                        <th class="px-1 py-2">+/-</th>
                                        <th class="px-2 py-2 text-red-500">نقاط</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${g.teams.map((t, index) => `
                                        <tr class="border-t border-slate-700">
                                            <td class="px-2 py-2 text-center font-bold text-gray-400">${index + 1}</td>
                                            <td class="px-2 py-2 font-semibold">${t.name}</td>
                                            <td class="px-1 py-2 text-center">${t.played || 0}</td>
                                            <td class="px-1 py-2 text-center">${t.won || 0}</td>
                                            <td class="px-1 py-2 text-center">${t.drawn || 0}</td>
                                            <td class="px-1 py-2 text-center">${t.lost || 0}</td>
                                            <td class="px-1 py-2 text-center">${t.goalDifference || 0}</td>
                                            <td class="px-2 py-2 text-center font-black text-red-500">${t.pts}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        </div>
                    </article>
                `).join('');
            });
    </script>
</body>
</html>
