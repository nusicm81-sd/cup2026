<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-4">
    <div id="groups-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        </div>

    <script>
        fetch('groups.json')
            .then(r => r.json())
            .then(data => {
                const container = document.getElementById('groups-container');
                container.innerHTML = data.map(g => `
                    <div class="bg-slate-800 p-4 rounded-xl border border-slate-700 shadow-xl">
                        <h2 class="text-xl font-bold text-red-500 mb-3 border-b border-slate-700 pb-2">${g.group}</h2>
                        ${g.teams.map(t => `
                            <div class="flex justify-between py-2 text-sm">
                                <span>${t.name}</span>
                                <span class="font-bold text-yellow-400">${t.pts} نقطة</span>
                            </div>
                        `).join('')}
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
