<script>
fetch('groups.json')
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById('groups-container');
    container.innerHTML = ''; // تفريغ الحاويات القديمة

    data.forEach(group => {
      const groupDiv = document.createElement('div');
      groupDiv.className = "bg-slate-900 rounded-xl p-4 shadow-lg border border-slate-700";
      groupDiv.innerHTML = `
        <h2 class="text-xl font-bold text-red-500 mb-4 border-b border-slate-700 pb-2">${group.group}</h2>
        <table class="w-full text-sm text-gray-300">
          <thead>
            <tr class="text-gray-500">
              <th class="text-left">الفريق</th>
              <th class="px-1">لعب</th>
              <th class="px-1">فوز</th>
              <th class="px-1">تعادل</th>
              <th class="px-1">خسارة</th>
              <th class="px-1">أهداف</th>
              <th class="px-1 font-bold text-white">نقطة</th>
            </tr>
          </thead>
          <tbody>
            ${group.teams.map(t => `
              <tr class="border-t border-slate-800">
                <td class="py-2">${t.name}</td>
                <td class="text-center">${t.played}</td>
                <td class="text-center">${t.won}</td>
                <td class="text-center">${t.drawn}</td>
                <td class="text-center">${t.lost}</td>
                <td class="text-center">${t.goalDifference}</td>
                <td class="text-center font-bold text-red-400">${t.pts}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
      container.appendChild(groupDiv);
    });
  });
</script>
