<div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="groups-container">
    </div>

<script>
    function updateData() {
        // تحديث الأخبار
        fetch('news.json').then(r => r.json()).then(data => {
            document.getElementById('news-container').innerHTML = data.map(n => 
                `<div class="p-3 border-b">${n.title}</div>`).join('');
        });

        // تحديث المجموعات
        fetch('groups.json').then(r => r.json()).then(data => {
            document.getElementById('groups-container').innerHTML = data.map(g => `
                <div class="bg-white p-4 rounded shadow">
                    <h3 class="font-bold text-red-700">${g.group}</h3>
                    ${g.teams.map(t => `<div class="flex justify-between"><span>${t.name}</span><span>${t.pts} نقطة</span></div>`).join('')}
                </div>
            `).join('');
        });
    }
    updateData();
    setInterval(updateData, 180000); // تحديث كل 3 دقائق
</script>
