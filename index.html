<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">
    <h1 class="text-2xl font-bold text-center mb-6">نتائج المجموعات</h1>
    
    <div id="groups-container" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        </div>

    <script>
        // دالة لجلب البيانات وتحديث الصفحة
        function updateData() {
            fetch('groups.json')
                .then(response => response.json())
                .then(data => {
                    const container = document.getElementById('groups-container');
                    container.innerHTML = data.map(g => `
                        <div class="bg-white p-5 rounded-lg shadow-md border-r-8 border-red-700">
                            <h3 class="font-bold text-lg text-red-700 mb-3">${g.group}</h3>
                            ${g.teams.map(t => `
                                <div class="flex justify-between py-1 border-b border-gray-100">
                                    <span>${t.name}</span>
                                    <span class="font-bold text-gray-700">${t.pts} نقطة</span>
                                </div>
                            `).join('')}
                        </div>
                    `).join('');
                });
        }
        
        // تشغيل الدالة عند تحميل الصفحة
        updateData();
    </script>
</body>
</html>
