<div id="groups-container" class="grid md:grid-cols-3 gap-6"></div>

<script>
fetch('groups.json')
  .then(response => response.json())
  .then(data => {
    const container = document.getElementById('groups-container');
    // إذا لم تظهر الجداول، أضف هذا السطر للتأكد من وصول البيانات
    console.log(data); 
    
    container.innerHTML = data.map(g => `
      <div class="bg-[#1e293b] p-4 rounded-xl border border-slate-700">
        <h2 class="text-red-500 font-bold mb-3">${g.group}</h2>
        <table class="w-full text-xs text-white">
          <tr class="text-gray-400 border-b border-slate-600">
            <th class="text-right">الفريق</th><th>ل</th><th>ف</th><th>ت</th><th>خ</th><th>+/-</th><th>ن</th>
          </tr>
          ${g.teams.map(t => `
            <tr class="border-b border-slate-700/50">
              <td class="py-2">${t.name}</td>
              <td class="text-center">${t.played}</td>
              <td class="text-center">${t.won}</td>
              <td class="text-center">${t.drawn}</td>
              <td class="text-center">${t.lost}</td>
              <td class="text-center">${t.goalDifference}</td>
              <td class="text-center text-red-500 font-bold">${t.pts}</td>
            </tr>`).join('')}
        </table>
      </div>`).join('');
  })
  .catch(error => console.error('Error loading JSON:', error));
</script>
